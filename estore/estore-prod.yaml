spring:
  main:
    banner-mode: off
  datasource:
    url: ${ES_DATASOURCE}
    username: ${ES_DB_USER}
    password: ${ES_DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  mail:
    host: ${ES_MAIL_HOST:smtp.gmail.com}
    port: ${ES_MAIL_PORT:587}
    username: ${ES_EMAIL_USER}
    password: ${ES_EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info, custom-info
  endpoint:
    health:
      show-details: always

admin:
  username: fdrdeveloper
  password: 1234