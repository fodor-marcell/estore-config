server:
  port: 8888

spring:
  application:
    name: config-service
  profiles:
    active: native
  cloud:
    config:
      server:
        git:
          uri: https://github.com/fodor-marcell/estore-config
          default-label: main
          search-paths: '{application}'

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh